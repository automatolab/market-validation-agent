[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "market-validation-agent"
version = "0.1.0"
description = "Prompt-driven market validation pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "python-dotenv>=1.0.0,<2.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0,<9.0.0"
]

[project.scripts]
market-merge-tracker = "market_validation.file_pipeline:main_merge_cli"
market-verify-pipeline = "market_validation.file_pipeline:main_verify_cli"
market-batch-worker = "market_validation.batch_worker:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
