; Alembic configuration for market-validation-agent.
;
; The sqlalchemy.url placeholder is intentionally empty — migrations/env.py
; resolves the real SQLite path at runtime via
; market_validation.research.resolve_db_path() so migrations follow the same
; DB-location logic as the rest of the app. Callers can override by setting
; MARKET_DB_PATH before running ``alembic upgrade``.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =
; Use millisecond-precision filenames so migrations ordered by creation time
; are still ordered lexically — easier to review in a PR.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
